server:
  port: 8081
spring:
  application:
    name: "VideogamesTournamentManagement"
  devtools:
    add-properties: false
  profiles:
    include: null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_ISSUER_URI:https://panlonanslxdfmbbqxjy.supabase.co/auth/v1}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

tournament:
  max-mods: 2
  max-free-tournaments: 2

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default-zone: http://localhost:8761/eureka
    eureka-server-connect-timeout-seconds: 2
    eureka-server-read-timeout-seconds: 5
    eureka-service-url-poll-interval-seconds: 20
    initial-instance-info-replication-interval-seconds: 10
    instance-info-replication-interval-seconds: 20
    registry-fetch-interval-seconds: 20
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance-id:${random.value}}
    lease-renewal-interval-in-seconds: 20
    lease-expiration-duration-in-seconds: 90

supabase:
  url: ${SUPABASE_URL:https://panlonanslxdfmbbqxjy.supabase.co/rest/v1}
  anon-key: ${SUPABASE_ANON_KEY:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}

rabbitmq:
  queues:
    email: ${RABBITMQ_EMAIL_QUEUE:notifications.email}
    sms: ${RABBITMQ_SMS_QUEUE:notifications.sms}

driven-adapter:
  qr:
    base-url: ${QR_BASE_URL:https://api.qrserver.com/v1/create-qr-code/}
